apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-deployment
spec:
  selector:
    matchLabels:
      app: petclinic
  replicas: 3
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: reddy177/petclinic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080


---

apiVersion: v1
kind: Service
metadata:
  name: petclinic-ssvc
spec:
  selector:
    app: petclinic
  ports:
    - protocol: "TCP"
      port: 8070
      targetPort: 8080
  type: LoadBalancer
